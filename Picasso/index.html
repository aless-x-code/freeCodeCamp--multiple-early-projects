<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Picasso Painting</title>
    <link rel="stylesheet" type="text/css" href="./styles.css" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.2/css/all.css"/>
  </head>
  <body>
    <div id="back-wall"></div> <!--background-->
      <div class="characters"></div> <!-- painting's characters container-->
       <div id="offwhite-character"> <!-- offwhite character container-->
          <div id="white-hat"></div> <!--white hat-->
          <div id="black-mask"> <!-- black  mask-->
            <div class="eyes left"></div> <!--mask's left eye-->
            <div class="eyes right"></div> <!-- mask's right eye-->
          </div> 
          <div id="gray-instrument"> <!-- gray instrument-->
            <div class="black-dot"></div> <!--gray instrument's black dot 1-->
            <div class="black-dot"></div> <!--gray instrument's black dot 2-->
            <div class="black-dot"></div> <!--gray instrument's black dot 3-->
            <div class="black-dot"></div> <!--gray instrument's black dot 4-->
            <div class="black-dot"></div> <!--gray instrument's black dot 5-->
          </div> 
          <div id="tan-table"></div> <!-- tan table-->
       </div>
  </body>
</html>
